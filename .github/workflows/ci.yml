name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

# Supply-chain policy: all third-party actions pinned to full commit SHAs
# (mutable tags are a proven attack vector - see the March 2026 trivy-action
# compromise); container images pinned by digest.

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      # The root config references the infra module by local sibling path;
      # check the module repo out where that path resolves.
      - name: Checkout infra module as sibling
        id: module
        continue-on-error: true
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: amrutp24/terraform-aws-durable-agent-pipeline
          path: .ci-module

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2

      - run: terraform fmt -check -recursive
        working-directory: terraform

      - name: terraform validate
        working-directory: terraform
        run: |
          # Use the CI checkout of the module and stub the build packages
          sed -i 's|source  = "amrutp24/durable-agent-pipeline/aws"|source = "../.ci-module"|; /version = "~> 1.1"/d' main.tf
          mkdir -p ../build/orchestrator ../build/api
          touch ../build/orchestrator/lambda_function.py ../build/api/lambda_function.py
          terraform init -backend=false
          terraform validate

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check src
      - run: python -m py_compile src/api/lambda_function.py src/orchestrator/lambda_function.py

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
      - name: Gitleaks (full git history)
        run: |
          docker run --rm -v "$PWD:/repo" \
            zricethezav/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            git /repo --no-banner --verbose
